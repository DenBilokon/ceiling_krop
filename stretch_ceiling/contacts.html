<!doctype html>
<html lang="uk">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Контакти | Натяжні стелі у Кропивницькому</title>
  <meta name="description" content="Контакти — натяжні стелі у Кропивницькому. Телефон, адреса, графік роботи.">
  <link rel="stylesheet" href="css/styles.css">
  <script defer src="js/data.js"></script>
  <script defer src="js/app.js"></script>
</head>
<body>
  <header class="topbar">
    <div class="container topbar__inner">
      <a class="brand" href="index.html"><span class="brand__name">Ceiling KROP</span><span class="brand__tag" data-i18n="brandTag">Кропивницький</span></a>
      <nav class="nav" aria-label="Main navigation"><a href="index.html" data-i18n="navHome">Головна</a><a href="services.html" data-i18n="navServices">Послуги</a><a href="prices.html" data-i18n="navPrices">Ціни</a><a href="portfolio.html" data-i18n="navPortfolio">Роботи</a><a href="contacts.html" aria-current="page" data-i18n="navContacts">Контакти</a></nav>
      <div class="actions"><div class="lang"><button type="button" data-lang="uk">UA</button><button type="button" data-lang="ru">RU</button></div><a class="btn" href="contacts.html" data-i18n="call">Замовити замір</a><button class="icon-btn" type="button" data-nav-toggle aria-label="Menu">☰</button></div>
    </div>
  </header>
  <main>
    <section class="contact-band">
      <div class="container contact-grid">
        <div>
          <div class="eyebrow" data-i18n="navContacts">Контакти</div>
          <h1 data-i18n="contactsTitle">Почнемо з безкоштовної консультації</h1>
          <p class="lead" data-i18n="contactsLead">Напишіть або залиште заявку.</p>
          <div class="contact-list">
            <a data-contact="phone" href="tel:+380000000000">+38 (000) 000-00-00</a>
            <a data-contact="facebook" href="https://www.facebook.com/Natyazhnyepotolki.krop">Facebook</a>
            <a data-contact="telegram" href="#">Telegram</a>
            <a data-contact="email" href="mailto:ceiling@example.com">ceiling@example.com</a>
            <span data-contact="city">Кропивницький та область</span>
          </div>
        </div>
        <form class="form" data-lead-form>
          <div class="field"><label data-i18n="name">Ім'я</label><input name="name" required></div>
          <div class="field"><label data-i18n="phone">Телефон</label><input name="phone" required></div>
          <div class="field"><label data-i18n="message">Що потрібно зробити</label><textarea name="message"></textarea></div>
          <button class="btn btn--wide" type="submit" data-i18n="send">Надіслати заявку</button>
        </form>
      </div>
    </section>
    <section class="section"><div class="container faq"><div class="section__head"><h2 data-i18n="faqTitle">Питання</h2></div><div data-render="faq"></div></div></section>
  </main>
  <footer class="footer"><div class="container footer__inner"><span data-i18n="footer">Натяжні стелі KROP.</span></div></footer>
  <div class="toast" role="status" aria-live="polite"></div>
</body>
</html>
