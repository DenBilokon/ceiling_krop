<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 900" role="img" aria-label="Minimal black and white stretch ceiling interior">
  <defs>
    <linearGradient id="wall" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f7f7f7"/>
      <stop offset="0.58" stop-color="#d8d8d8"/>
      <stop offset="1" stop-color="#ffffff"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" x2="1" y1="0" y2="0">
      <stop offset="0" stop-color="#111"/>
      <stop offset="1" stop-color="#555"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="1200" height="900" fill="#101010"/>
  <polygon points="0,100 1200,0 1200,900 0,900" fill="url(#wall)"/>
  <polygon points="0,650 1200,555 1200,900 0,900" fill="url(#floor)" opacity="0.92"/>
  <polygon points="68,120 1132,40 1022,252 166,295" fill="#fdfdfd"/>
  <polygon points="166,295 1022,252 1022,295 166,340" fill="#111"/>
  <path d="M185 305 L1010 264" stroke="#fff" stroke-width="8" filter="url(#softGlow)"/>
  <path d="M214 326 L974 287" stroke="#101010" stroke-width="4"/>
  <rect x="96" y="386" width="232" height="188" fill="#f6f6f6" stroke="#1a1a1a" stroke-width="10"/>
  <rect x="150" y="430" width="124" height="96" fill="#111"/>
  <rect x="690" y="360" width="340" height="170" fill="#fbfbfb" stroke="#202020" stroke-width="8"/>
  <path d="M710 392 H1008" stroke="#111" stroke-width="10"/>
  <path d="M710 430 H930" stroke="#111" stroke-width="6" opacity="0.75"/>
  <path d="M710 466 H990" stroke="#111" stroke-width="6" opacity="0.55"/>
  <ellipse cx="340" cy="705" rx="230" ry="50" fill="#000" opacity="0.32"/>
  <rect x="160" y="610" width="360" height="80" rx="8" fill="#f5f5f5"/>
  <rect x="185" y="555" width="310" height="90" rx="8" fill="#ffffff"/>
  <rect x="790" y="610" width="230" height="24" fill="#f8f8f8"/>
  <rect x="805" y="634" width="18" height="118" fill="#f8f8f8"/>
